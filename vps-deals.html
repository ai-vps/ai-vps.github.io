<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VPS优惠信息汇总 - 500+最新促销活动 CN2 GIA 香港 日本 美国 VPS">
    <title>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</title>
    <style>
        body {font-family: "Microsoft YaHei", system-ui, sans-serif; margin:0; padding:0; background:#f8f9fa;}
        .teaser {
            background: white;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 0;
        }
        #real-content {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
        }
        .loading {
            text-align: center;
            padding: 80px 20px;
            font-size: 18px;
            color: #555;
        }
        /* 隐藏 teaser，一旦真实内容加载成功 */
        .loaded .teaser {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 引流 teaser -->
    <div class="teaser">
        <h1>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</h1>
        <p><strong>最后更新：</strong>2026年7月12日　|　<strong>收录优惠：</strong>500条</p>
        <p>CN2 GIA VPS、洛杉矶VPS、香港VPS、日本VPS、新加坡VPS、DMIT、搬瓦工、HostDare、RakSmart 等最新优惠</p>
        <p><strong>正在加载完整内容...</strong></p>
    </div>

    <!-- 真实内容区域 -->
    <div id="real-content">
        <div class="loading">正在从服务器加载最新优惠信息，请稍候...</div>
    </div>

    <script>
        const REAL_URL = "https://aivps.dpdns.org/vps-deals.html";

        async function loadRealContent() {
            const container = document.getElementById("real-content");
            const body = document.body;

            try {
                const res = await fetch(REAL_URL);
                if (!res.ok) throw new Error();

                let html = await res.text();

                // 清理多余标签
                html = html.replace(/<html[^>]*>|<\/html>|<head>[\s\S]*?<\/head>|<body[^>]*>|<\/body>/gi, '');

                container.innerHTML = html;
                
                // 成功加载后隐藏 teaser
                body.classList.add('loaded');

            } catch (err) {
                console.log("Fetch失败，使用 iframe 回退");
                container.innerHTML = `
                    <iframe src="${REAL_URL}" 
                            style="width:100%; min-height:160vh; border:none; border-radius:0;"
                            title="VPS优惠详情">
                    </iframe>`;
                body.classList.add('loaded');
            }
        }

        // 执行
        window.onload = loadRealContent;
    </script>
</body>
</html>
