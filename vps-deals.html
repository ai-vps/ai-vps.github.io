<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</title>
    <style>
        .teaser {
            background: #f8f9fa;
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid #ddd;
        }
        body.loaded .teaser { display: none !important; }
    </style>
</head>
<body>

    <div class="teaser">
        <h1>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</h1>
        <p><strong>最后更新：</strong>2026年7月12日　|　<strong>收录优惠：</strong>500条</p>
        <p>CN2 GIA VPS、香港VPS、日本VPS、洛杉矶VPS、新加坡VPS、DMIT 等最新促销</p>
    </div>

    <div id="real-content">
        <div style="padding:120px; text-align:center;">正在加载完整优惠列表...</div>
    </div>

    <script>
        const REAL_URL = "https://aivps.dpdns.org/vps-deals.html";

        async function loadPage() {
            const container = document.getElementById("real-content");

            try {
                const res = await fetch(REAL_URL);
                if (!res.ok) throw new Error();

                let html = await res.text();

                // 插入样式
                const headMatch = html.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
                if (headMatch) {
                    const temp = document.createElement('div');
                    temp.innerHTML = headMatch[1];
                    document.head.append(...temp.children);
                }

                // 插入页面主体
                const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                container.innerHTML = bodyMatch ? bodyMatch[1] : html;

                document.body.classList.add('loaded');

                // 加载搜索 JS
                const searchScript = document.createElement('script');
                searchScript.src = "https://ai-vps.github.io/search-index.js";
                searchScript.onload = function() {
                    console.log("✅ search-index.js 加载成功，SEARCH_INDEX 已就绪");
                    
                    // 强制触发搜索初始化
                    setTimeout(() => {
                        const event = new Event('DOMContentLoaded');
                        document.dispatchEvent(event);
                        
                        // 如果有 searchInput，强制再绑定一次
                        const searchInput = document.getElementById('searchInput');
                        if (searchInput) {
                            console.log("找到搜索框，正在绑定事件");
                        }
                    }, 800);
                };
                document.body.appendChild(searchScript);

            } catch (e) {
                console.error(e);
                container.innerHTML = `<p style="color:red;text-align:center;padding:60px;">加载失败</p>`;
            }
        }

        window.onload = loadPage;
    </script>
</body>
</html>
