<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</title>
    <style>
        .teaser {
            background: #f8f9fa;
            padding: 25px 15px;
            text-align: center;
            border-bottom: 3px solid #ccc;
        }
        body.loaded .teaser { display: none !important; }
        #real-content { width: 100%; }
    </style>
</head>
<body>

    <div class="teaser">
        <h1>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</h1>
        <p><strong>最后更新：</strong>2026年7月12日　|　<strong>收录优惠：</strong>500条</p>
        <p>CN2 GIA VPS、香港VPS、日本VPS、洛杉矶VPS、新加坡VPS 等最新促销</p>
    </div>

    <div id="real-content">
        <div style="padding:120px 20px; text-align:center; font-size:18px;">正在加载完整内容与功能...</div>
    </div>

    <script>
        const REAL_URL = "https://aivps.dpdns.org/vps-deals.html";

        async function loadFullPage() {
            const container = document.getElementById("real-content");

            try {
                const res = await fetch(REAL_URL);
                if (!res.ok) throw new Error();

                let html = await res.text();

                // 1. 提取并插入 head（样式 + 外部JS）
                const headMatch = html.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
                if (headMatch) {
                    const headDiv = document.createElement('div');
                    headDiv.innerHTML = headMatch[1];
                    document.head.append(...headDiv.children);
                }

                // 2. 提取 body 内容
                const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                const bodyHTML = bodyMatch ? bodyMatch[1] : html;

                container.innerHTML = bodyHTML;

                // 3. 重新执行所有内联和外部脚本
                const scripts = container.querySelectorAll('script');
                for (let script of scripts) {
                    const newScript = document.createElement('script');
                    
                    if (script.src) {
                        newScript.src = script.src;
                        newScript.async = false;   // 保持顺序
                    } else {
                        newScript.textContent = script.textContent;
                    }
                    
                    document.body.appendChild(newScript);
                    // script.remove(); // 可选
                }

                // 隐藏 teaser
                document.body.classList.add('loaded');

            } catch (e) {
                console.error(e);
                container.innerHTML = `<p style="color:red;text-align:center;padding:50px;">加载失败，请直接访问 <a href="${REAL_URL}">${REAL_URL}</a></p>`;
            }
        }

        window.onload = loadFullPage;
    </script>
</body>
</html>
