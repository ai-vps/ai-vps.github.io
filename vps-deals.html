<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</title>
    <style>
        .teaser {
            background: #f8f9fa;
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid #ddd;
        }
        body.loaded .teaser { display: none !important; }
        #real-content { width: 100%; }
    </style>
</head>
<body>

    <div class="teaser">
        <h1>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</h1>
        <p><strong>最后更新：</strong>2026年7月12日　|　<strong>收录优惠：</strong>500条</p>
        <p>CN2 GIA VPS、香港VPS、日本VPS、洛杉矶VPS、新加坡VPS 等最新促销</p>
    </div>

    <div id="real-content">
        <div style="padding:100px; text-align:center; font-size:18px;">加载中...</div>
    </div>

    <script src="https://ai-vps.github.io/search-index.js"></script>

    <script>
        const REAL_URL = "https://aivps.dpdns.org/vps-deals.html";

        async function loadPage() {
            const container = document.getElementById("real-content");

            try {
                const res = await fetch(REAL_URL);
                if (!res.ok) throw new Error();

                let html = await res.text();

                // 保留 head 中的样式
                const headMatch = html.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
                if (headMatch) {
                    const temp = document.createElement('div');
                    temp.innerHTML = headMatch[1];
                    document.head.append(...temp.children);
                }

                // 主体内容
                const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                container.innerHTML = bodyMatch ? bodyMatch[1] : html;

                // 隐藏 teaser
                document.body.classList.add('loaded');

                // 延迟执行搜索相关JS
                setTimeout(() => {
                    if (typeof doSearch === 'function') {
                        console.log("搜索函数已加载");
                    }
                    if (typeof toggleDark === 'function') {
                        // 重新初始化暗黑模式等
                    }
                }, 1200);

            } catch (e) {
                container.innerHTML = `<p style="color:red;padding:60px;text-align:center;">加载失败</p>`;
            }
        }

        window.onload = loadPage;
    </script>
</body>
</html>
