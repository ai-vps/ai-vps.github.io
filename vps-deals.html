<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</title>
    <style>
        body {font-family: "Microsoft YaHei", sans-serif; margin:0; padding:20px; background:#f8f9fa;}
        .teaser {background:white; padding:30px; border-radius:12px; max-width:1000px; margin:20px auto; box-shadow:0 4px 20px rgba(0,0,0,0.08);}
        #real-content {max-width:1000px; margin:20px auto;}
        .loading {text-align:center; padding:100px 20px; font-size:18px;}
    </style>
</head>
<body>

<div class="teaser">
    <h1>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</h1>
    <p><strong>最后更新：</strong>2026年7月12日　|　收录优惠：500条</p>
    <p>CN2 GIA VPS、洛杉矶VPS、香港VPS、日本VPS、新加坡VPS、DMIT、搬瓦工等最新优惠</p>
    <p><strong>正在加载完整内容...</strong></p>
</div>

<div id="real-content">
    <div class="loading">加载中，请稍候...</div>
</div>

<script>
    const REAL_URL = "https://aivps.dpdns.org/vps-deals.html";

    async function loadRealPage() {
        const container = document.getElementById("real-content");
        
        try {
            const res = await fetch(REAL_URL, { 
                method: 'GET',
                credentials: 'omit'
            });
            
            if (!res.ok) throw new Error("HTTP " + res.status);
            
            let html = await res.text();
            
            // 清理并插入内容
            html = html.replace(/<html[^>]*>|<\/html>|<head>[\s\S]*?<\/head>|<body[^>]*>|<\/body>/gi, '');
            container.innerHTML = html;
            
        } catch (err) {
            console.log("Fetch 失败，尝试 iframe 回退", err);
            container.innerHTML = `<iframe src="${REAL_URL}" style="width:100%; min-height:120vh; border:none; border-radius:8px;"></iframe>`;
        }
    }

    window.onload = loadRealPage;
</script>
</body>
</html>
