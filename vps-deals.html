<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</title>
    <style>
        .teaser {
            background: #f8f9fa;
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid #ddd;
        }
        body.loaded .teaser {
            display: none !important;
        }
        iframe, #real-content {
            width: 100%;
            min-height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <!-- GitHub 引流内容 -->
    <div class="teaser">
        <h1>VPS优惠信息汇总 - 500+最新促销活动(2026年7月)</h1>
        <p><strong>最后更新：</strong>2026年7月12日　|　<strong>收录：</strong>500条</p>
        <p>CN2 GIA・洛杉矶VPS・香港VPS・日本VPS・新加坡VPS・DMIT・搬瓦工 等最新优惠</p>
    </div>

    <!-- 真实内容容器 -->
    <div id="real-content"></div>

    <script>
        const REAL_URL = "https://aivps.dpdns.org/vps-deals.html";

        async function loadFullPage() {
            const container = document.getElementById("real-content");

            try {
                // 优先尝试 fetch + 保留 head
                const res = await fetch(REAL_URL);
                if (!res.ok) throw new Error();

                let fullHTML = await res.text();

                // 把整个页面内容放进去（保留 head 中的样式和脚本）
                container.innerHTML = fullHTML;

                // 隐藏 teaser
                document.body.classList.add('loaded');

            } catch (e) {
                console.log("直接加载失败，使用 iframe");
                container.innerHTML = `
                    <iframe src="${REAL_URL}" 
                            sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
                            allowfullscreen>
                    </iframe>`;
                document.body.classList.add('loaded');
            }
        }

        window.onload = loadFullPage;
    </script>
</body>
</html>
